# ── Google OAuth 2.0 ──────────────────────────────────────────────────
# 1. Go to https://console.cloud.google.com/apis/credentials
# 2. Create OAuth 2.0 Client ID (Web Application)
# 3. Add redirect URI: http://localhost:8501
# 4. Paste Client ID and Secret below
[google_oauth]
client_id = ""
client_secret = ""
redirect_uri = "http://localhost:8501"

# ── Facebook OAuth ────────────────────────────────────────────────────
# 1. Go to https://developers.facebook.com/apps/
# 2. Create an app → Add Facebook Login product
# 3. Set Valid OAuth Redirect URIs: http://localhost:8501
# 4. Paste App ID and Secret below
[facebook_oauth]
app_id = ""
app_secret = ""
redirect_uri = "http://localhost:8501"

